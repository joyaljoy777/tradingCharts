<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Chart Calendar</title>
    <meta
      name="description"
      content="A compact calendar viewer for trading chart screenshots."
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="event-data.js"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-a" aria-hidden="true"></div>
      <div class="ambient ambient-b" aria-hidden="true"></div>

      <header class="app-header">
        <div class="control-bar" aria-label="Calendar controls">
          <button
            id="prevMonthBtn"
            class="nav-button"
            type="button"
            aria-label="Show previous month"
          >
            <span aria-hidden="true">&#8592;</span>
          </button>

          <label class="control-field">
            <span class="control-label">Symbol</span>
            <select id="symbolSelect" name="symbol"></select>
          </label>

          <label class="control-field">
            <span class="control-label">Month</span>
            <input id="monthPicker" name="month" type="month" />
          </label>

          <button
            id="nextMonthBtn"
            class="nav-button"
            type="button"
            aria-label="Show next month"
          >
            <span aria-hidden="true">&#8594;</span>
          </button>
        </div>

        <div class="status-strip">
          <p id="monthStatus" class="month-status" aria-live="polite"></p>
        </div>
      </header>

      <main class="calendar-frame">
        <section class="calendar-shell" aria-label="Monthly calendar">
          <div class="weekday-row" aria-hidden="true">
            <div class="weekday-pill">
              <span class="weekday-long">Sun</span>
              <span class="weekday-short">S</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Mon</span>
              <span class="weekday-short">M</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Tue</span>
              <span class="weekday-short">T</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Wed</span>
              <span class="weekday-short">W</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Thu</span>
              <span class="weekday-short">T</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Fri</span>
              <span class="weekday-short">F</span>
            </div>
            <div class="weekday-pill">
              <span class="weekday-long">Sat</span>
              <span class="weekday-short">S</span>
            </div>
          </div>

          <div id="calendarGrid" class="calendar-grid" aria-live="polite"></div>

          <div id="emptyState" class="empty-state" hidden>
            <p class="empty-title">No charts for this month</p>
            <p class="empty-copy">
              Switch the month or pick another symbol to inspect saved screenshots.
            </p>
          </div>
        </section>
      </main>
    </div>

    <div id="lightbox" class="lightbox" hidden>
      <div class="lightbox-backdrop" data-close-modal="true"></div>
      <div
        class="lightbox-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="lightboxTitle"
      >
        <button
          id="lightboxClose"
          class="lightbox-close"
          type="button"
          aria-label="Close image viewer"
          data-close-modal="true"
        >
          &#10005;
        </button>

        <div class="lightbox-copy">
          <p id="lightboxTitle" class="lightbox-title">Chart screenshot</p>
          <p id="lightboxMeta" class="lightbox-meta"></p>
        </div>

        <div id="lightboxBody" class="lightbox-body"></div>
      </div>
    </div>
  </body>
</html>
